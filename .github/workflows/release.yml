name: Build Windows EXE Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, for example v1.0.0"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r requirements.txt

      - name: Build EXE with PyInstaller
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name PDFjsNormalizerGUI app.py

      - name: Prepare release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist\PDFjsNormalizerGUI.exe release\PDFjsNormalizerGUI.exe
          Get-FileHash release\PDFjsNormalizerGUI.exe -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  PDFjsNormalizerGUI.exe" } |
            Set-Content release\SHA256SUMS.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFjsNormalizerGUI-windows
          path: |
            release/PDFjsNormalizerGUI.exe
            release/SHA256SUMS.txt
          if-no-files-found: error

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "tag=${{ inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release create "${{ steps.release_tag.outputs.tag }}" `
            release\PDFjsNormalizerGUI.exe `
            release\SHA256SUMS.txt `
            --target "${{ github.sha }}" `
            --title "PDFjsNormalizerGUI ${{ steps.release_tag.outputs.tag }}" `
            --notes "Windows EXE build for PDFjsNormalizerGUI. Download PDFjsNormalizerGUI.exe and run it directly."
